name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        # Sito servito dal dominio custom alla root: nessun VITE_GHPAGES_BASE (base = /).
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          # Rigenera il file CNAME a ogni deploy: senza, il custom domain si sgancia.
          cname: beatriceferrarinutrizionista.it
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
